# OpenTAKServer Web UI (HTTP) — serves the Vue.js frontend and proxies
# API/Marti/socket.io requests to the OTS Flask app on 127.0.0.1:8081.
# Mirrors the official OTS nginx layout (ots_http) but without TLS, for
# local Docker dev. Put TLS termination in front (reverse proxy) for prod.
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /var/www/html/opentakserver;
    index index.html index.htm;

    client_max_body_size 100M;

    # Marti API
    location /Marti {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OTS REST API
    location /api {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / socket.io
    location /socket.io {
        proxy_pass http://127.0.0.1:8081/socket.io;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
